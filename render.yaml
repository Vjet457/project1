services:
  - type: web
    name: aarogyasaathi
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    rootDir: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://aarogyasaathi.onrender.com
